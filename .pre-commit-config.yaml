repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: debug-statements

  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        description: "Lint with the Termux-native ruff binary"
        entry: ruff check --force-exclude
        language: system
        types_or: [python, pyi]
        args: [--fix]
        require_serial: true
      - id: ruff-format
        name: ruff format
        description: "Format with the Termux-native ruff binary"
        entry: ruff format --force-exclude
        language: system
        types_or: [python, pyi]
        require_serial: true
